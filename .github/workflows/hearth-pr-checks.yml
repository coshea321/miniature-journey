# Zero-token backstop for the Hearth per-change checklist: re-runs the
# hearth-verifier subagent's mechanical checks on every PR. To make a red ✗
# actually BLOCK merging, add a branch-protection rule on main requiring
# the "Hearth checks" status (repo → Settings → Branches).
name: Hearth checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  hearth-checks:
    name: Hearth checks
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.base_ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify index.html + sw.js
        run: |
          set -uo pipefail
          fail=0
          err(){ echo "::error::$1"; fail=1; }

          # 1. Syntax-check the main inline script block:
          #    from the "// PREVIEW MODE" comment to the FIRST </script>
          #    AT OR AFTER it (the DOMPurify tag closes earlier; a literal
          #    </script> never appears inside JS strings - the print-doc
          #    uses the escaped <\/script> form).
          START=$(grep -n '// PREVIEW MODE' index.html | head -1 | cut -d: -f1)
          if [ -z "${START}" ]; then
            err "'// PREVIEW MODE' marker not found in index.html"
          else
            END=$(awk -v s="$START" 'NR>=s && /<\/script>/{print NR; exit}' index.html)
            sed -n "${START},$((END-1))p" index.html > /tmp/hearth-block.js
            if node --check /tmp/hearth-block.js; then
              echo "node --check OK (lines $START-$((END-1)))"
            else
              err "node --check failed on the main script block"
            fi
          fi

          # 2. File structure
          [ "$(grep -ci '<!doctype' index.html)" = "2" ] \
            || err "DOCTYPE count != 2 (expect one real + one in the print-doc string)"
          [ "$(grep -c '<html lang' index.html)" = "1" ] \
            || err "html-lang count != 1"
          [ "$(grep -cE 'v[0-9]{3} · [0-9]{2}/[0-9]{2}/[0-9]{4}' index.html)" = "1" ] \
            || err "in-file version label count != 1"
          BYTES=$(wc -c < index.html)
          echo "index.html is $BYTES bytes"
          [ "$BYTES" -lt 900000 ] \
            || err "index.html is $BYTES bytes - v221-style document doubling?"
          tail -c 40 index.html | tr -d '[:space:]' | grep -q '</body></html>$' \
            || err "index.html does not end cleanly with </body></html>"

          # 3. sw.js is the single source of truth - index.html must match it
          SWV=$(grep -oE 'v[0-9]{3} · [0-9]{2}/[0-9]{2}/[0-9]{4}' sw.js | head -1)
          HTMLV=$(grep -oE 'v[0-9]{3} · [0-9]{2}/[0-9]{2}/[0-9]{4}' index.html | head -1)
          echo "sw.js: '$SWV'  index.html: '$HTMLV'"
          [ -n "$SWV" ] || err "no vNNN · DD/MM/YYYY version found in sw.js"
          [ "$SWV" = "$HTMLV" ] || err "version mismatch: sw.js '$SWV' vs index.html '$HTMLV'"

          # 4. If app files changed in this PR, the version must be bumped
          git fetch --quiet --depth=1 origin "$BASE_REF"
          if git diff --quiet FETCH_HEAD -- index.html sw.js; then
            echo "app files unchanged vs $BASE_REF - bump check skipped"
          else
            BASEV=$(git show FETCH_HEAD:sw.js | grep -oE 'v[0-9]{3}' | head -1)
            if [ "$((10#${SWV:1:3}))" -gt "$((10#${BASEV:1:3}))" ]; then
              echo "version bumped: $BASEV -> ${SWV%% *}"
            else
              err "index.html/sw.js changed but version not bumped ($BASEV -> ${SWV%% *})"
            fi
          fi

          exit $fail
