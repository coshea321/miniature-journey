function playChime(){
  try{

      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.25,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+1.1);
      o.start(t);o.stop(t+1.1);
    });
  }catch(e){}
}

function getPoseKey(name, flowIdx) {
  var n = name.toLowerCase();
  // Flow 2 — photos available
  if (flowIdx === 1) {
    if (n.includes('seated forward fold variation')) return {photo:'seated_fwd_var'};
    if (n.includes('boat prep') || n.includes('core stability')) return {photo:'boat_prep'};
    if (n.includes('seated spinal twist') || n.includes('seated twist')) return {photo:'seated_twist'};
    if (n.includes('head-to-knee') || n.includes('janu')) return {photo:'head_to_knee'};
    if (n.includes('bound angle') || n.includes('diamond')) return {photo:'bound_angle'};
    if (n.includes('swimming')) return {photo:'swimming'};
    if (n.includes('paschimottanasana') || (n.includes('seated forward fold') && !n.includes('variation'))) return {photo:'paschimottanasana'};
    if (n.includes('froggy')) return {photo:'froggy'};
    if (n.includes('yogi squat') || n.includes('malasana')) return {photo:'yogi_squat'};
    if (n.includes('standing forward') || n.includes('uttanasana')) return {photo:'standing_fold'};
    if (n.includes('knees to chest') || n.includes('apanasana')) return {photo:'knees_chest'};
    if (n.includes('eagle legs')) return {photo:'eagle_twist'};
    if (n.includes('happy baby')) return {photo:'happy_baby'};
    if (n.includes('windshield')) return {photo:'windshield'};
    if (n.includes('savasana')) return {photo:'savasana2'};
    return null;
  }
  // Flow 1 — SVG illustrations
  if (n.includes('savasana')) return {svg:'savasana'};
  if (n.includes('cat') || n.includes('cow')) return {svg:'cat_cow'};
  if (n.includes('bird')) return {svg:'bird_dog'};
  if (n.includes('dead bug')) return {svg:'dead_bug'};
  if (n.includes('child')) return {svg:'childs_pose'};
  if (n.includes('low lunge')) return {svg:'low_lunge'};
  if (n.includes('half split')) return {svg:'half_splits'};
  if (n.includes('mountain')) return {svg:'mountain'};
  if (n.includes('warrior i') && !n.includes('ii')) return {svg:'warrior1'};
  if (n.includes('warrior ii')) return {svg:'warrior2'};
  if (n.includes('reclined butterfly')) return {svg:'reclined_butterfly'};
  if (n.includes('supine twist')) return {svg:'supine_twist'};
  if (n.includes('bridge')) return {svg:'bridge'};
  if (n.includes('knees to chest') || n.includes('apanasana')) return {svg:'knees_chest_svg'};
  if (n.includes('side stretch')) return {svg:'side_stretch'};
  if (n.includes('centering') || n.includes('neck')) return {svg:'seated_cross'};
  return null;
}

function PoseImage(props) {
  var name = props.name;
  var flowIdx = props.flowIdx || 0;
  var key = getPoseKey(name, flowIdx);
  if (!key) return null;
  if (key.photo) {
    var url = POSE_PHOTOS[key.photo];
    if (!url) return null;
    return h('img', {
      src: url, alt: name,
      style: {width:'100%',maxWidth:260,borderRadius:12,margin:'0 auto 12px',display:'block',objectFit:'cover'}
    });
  }
  if (key.svg) {
    var content = POSE_SVGS[key.svg];
    if (!content) return null;
    var svg = '<svg viewBox="0 0 160 120" width="100%" xmlns="http://www.w3.org/2000/svg"><g stroke="#c8a97e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">' + content + '</g></svg>';
    return h('div', {

}

function MiniChart(props) {
  var data = props.data, color = props.color;
  if (!data || data.length < 2) return h('p',{style:{color:'#555',textAlign:'center',padding:'12px 0',fontSize:12}},'Log 2+ entries to show trend.');
  var W=300,H=110,pl=36,pr=10,pt=8,iW=W-pl-pr,iH=H-pt-18;
  var vals=data.map(function(d){return d.value;}),mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||1;
  function cx(i){return pl+(i/(data.length-1))*iW;}
  function cy(v){return pt+iH-((v-mn)/rng)*iH;}
  var pts=data.map(function(d,i){return cx(i)+','+cy(d.value);}).join(' ');
  var step=Math.max(1,Math.ceil(data.length/5));
  return h('svg',{width:'100%',viewBox:'0 0 '+W+' '+H,style:{overflow:'visible'}},
    [mn,mx].map(function(v,i){return h('g',{key:i},h('line',{x1:pl,x2:W-pr,y1:cy(v),y2:cy(v),stroke:'#222',strokeWidth:1}),h('text',{x:pl-4,y:cy(v)+4,textAnchor:'end',fill:'#555',fontSize:10},Math.round(v)));}),
    data.map(function(d,i){return i%step===0?h('text',{key:'l'+i,x:cx(i),y:H-2,textAnchor:'middle',fill:'#555',fontSize:9},d.date):null;}),
    h('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:2,strokeLinejoin:'round',strokeLinecap:'round'}),
    data.map(function(d,i){return h('circle',{key:'c'+i,cx:cx(i),cy:cy(d.value),r:3,fill:color});})
  );
}

  var si=useState(0); var ssIdx=si[0]; var setSsIdx=si[1];
  var rs=useState(1); var round=rs[0]; var setRound=rs[1];
  var ph=useState('log'); var phase=ph[0]; var setPhase=ph[1];
  var en=useState({}); var entries=en[0]; var setEntries=en[1];
  var cr=useState(1); var condRound=cr[0]; var setCondRound=cr[1];
  var rt=useState(50); var restTime=rt[0]; var setRestTime=rt[1];
  var rd=useState(50); var restDur=rd[0]; var setRestDur=rd[1];
  var iRef=useRef(null); var advRef=useRef(null);
  var yf=useState(0); var yogaFlowIdx=yf[0]; var setYogaFlowIdx=yf[1];
  var yi=useState(0); var yogaIdx=yi[0]; var setYogaIdx=yi[1];
  var yt=useState(0); var yogaTime=yt[0]; var setYogaTime=yt[1];
  var yg=useState(false); var yogaStarted=yg[0]; var setYogaStarted=yg[1];
  var yp=useState(false); var yogaPaused=yp[0]; var setYogaPaused=yp[1];
  var yogaRef=useRef(null);
  var pp=useState(0); var physioProgIdx=pp[0]; var setPhysioProgIdx=pp[1];
  var pe=useState(0); var physioEx=pe[0]; var setPhysioEx=pe[1];
  var ps2=useState(1); var physioSet=ps2[0]; var setPhysioSet=ps2[1];
  var pt=useState(0); var physioTime=pt[0]; var setPhysioTime=pt[1];
  var pr=useState(false); var physioRunning=pr[0]; var setPhysioRunning=pr[1];
  var pp2=useState('select'); var physioPhase=pp2[0]; var setPhysioPhase=pp2[1];
  var physioRef=useRef(null);
  var bs=useState(''); var bpSys=bs[0]; var setBpSys=bs[1];
  var bd=useState(''); var bpDia=bd[0]; var setBpDia=bd[1];
  var bp3=useState(''); var bpPulse=bp3[0]; var setBpPulse=bp3[1];
  var wv=useState(''); var weightVal=wv[0]; var setWeightVal=wv[1];
  var ex2=useState(null); var expanded=ex2[0]; var setExpanded=ex2[1];
  var se=useState('rows'); var selEx=se[0]; var setSelEx=se[1];
  var ip=useState(null); var installPrompt=ip[0]; var setInstallPrompt=ip[1];

  useEffect(function(){
    var hh=function(e){e.preventDefault();setInstallPrompt(e);};
    window.addEventListener('beforeinstallprompt',hh);
    return function(){window.removeEventListener('beforeinstallprompt',hh);};
  },[]);

  useEffect(function(){
    if(phase!=='rest')return;
    iRef.current=setInterval(function(){
      setRestTime(function(t){if(t>1)return t-1;clearInterval(iRef.current);setTimeout(function(){setPhase('log');if(advRef.current)advRef.current();},50);return 0;});
    },1000);
    return function(){clearInterval(iRef.current);};
  },[phase]);

  useEffect(function(){
    if(!yogaStarted||yogaPaused||view!=='yoga')return;
    var flow=YOGA_FLOWS[yogaFlowIdx];
    yogaRef.current=setInterval(function(){
      setYogaTime(function(t){
        if(t>1)return t-1;
        clearInterval(yogaRef.current);playChime();
        var next=yogaIdx+1;
        setTimeout(function(){
          if(next>=flow.length){setYogaStarted(false);setPhase('yogaDone');}
          else{setYogaIdx(next);setYogaTime(flow[next].dur);}
        },150);
        return 0;
      });
    },1000);
    return function(){clearInterval(yogaRef.current);};
  },[yogaStarted,yogaPaused,yogaIdx,view,yogaFlowIdx]);

  useEffect(function(){
    if(!physioRunning||view!=='physio')return;
    physioRef.current=setInterval(function(){
      setPhysioTime(function(t){if(t>1)return t-1;clearInterval(physioRef.current);setPhysioRunning(false);playChime();return 0;});
    },1000);
    return function(){clearInterval(physioRef.current);};
  },[physioRunning,view]);

  function saveHistory(hh){setHistory(hh);LS.set('wlog_v2',hh);}
  function saveBp(ll){setBpLog(ll);LS.set('bp_log',ll);}
  function saveWeight(ll){setWeightLog(ll);LS.set('weight_log',ll);}
  function startWorkout(t){setWType(t);setSsIdx(0);setRound(1);setPhase('log');setEntries({});setCondRound(1);setView('workout');}
  function startRest(fn){var dur=WK[wType].supersets[ssIdx].restSec;advRef.current=fn;setRestDur(dur);setRestTime(dur);setPhase('rest');}
  function skipRest(){clearInterval(iRef.current);setPhase('log');if(advRef.current)advRef.current();}
  function upd(ss,r,id,v){setEntries(function(prev){var n=Object.assign({},prev);n[eKey(ss,r,id)]=v;return n;});}
  function completeRound(){
    var ss=WK[wType].supersets[ssIdx];
    if(round<ss.rounds){startRest(function(){setRound(function(r){return r+1;});});}
    else if(ssIdx<WK[wType].supersets.length-1){startRest(function(){setSsIdx(function(i){return i+1;});setRound(1);});}
    else{setPhase('condOption');}
  }
  function completeCondRound(){if(condRound<COND.rounds)setCondRound(function(c){return c+1;});else finish(true);}
  function finish(cond){var s={id:Date.now(),date:new Date().toISOString().slice(0,10),type:wType,cond:!!cond,data:Object.assign({},entries)};saveHistory([s].concat(history));setPhase('complete');}
  function goYoga(){setPhase('yogaSelect');setView('yoga');}
  function startYoga(idx){var flow=YOGA_FLOWS[idx];setYogaFlowIdx(idx);setYogaIdx(0);setYogaTime(flow[0].dur);setYogaStarted(false);setYogaPaused(false);setPhase('yogaIntro');}
  function skipYogaPose(){var flow=YOGA_FLOWS[yogaFlowIdx];clearInterval(yogaRef.current);playChime();var next=yogaIdx+1;if(next>=flow.length){setYogaStarted(false);setPhase('yogaDone');}else{setYogaIdx(next);setYogaTime(flow[next].dur);}}
  function finishYoga(){var flow=YOGA_FLOWS[yogaFlowIdx];var s={id:Date.now(),date:new Date().toISOString().slice(0,10),type:'yoga',data:{poses:flow.length,duration:YOGA_TOTALS[yogaFlowIdx],flowName:YOGA_NAMES[yogaFlowIdx]}};saveHistory([s].concat(history));setView('home');}
  function goPhysio(){setPhysioPhase('select');setView('physio');}
  var prog=PROGRAMMES[physioProgIdx];
  function startPhysio(idx){var p2=PROGRAMMES[idx];setPhysioProgIdx(idx);setPhysioEx(0);setPhysioSet(1);setPhysioTime(p2.exercises[0].type==='timed'?p2.exercises[0].dur:0);setPhysioRunning(false);setPhysioPhase('intro');}
  function physioNext(){var ex=prog.exercises[physioEx];if(physioSet<ex.sets){setPhysioSet(function(s){return s+1;});if(ex.type==='timed'){setPhysioTime(ex.dur);setPhysioRunning(false);}}else{var next=physioEx+1;if(next>=prog.exercises.length)setPhysioPhase('done');else{setPhysioEx(next);setPhysioSet(1);var nex=prog.exercises[next];setPhysioTime(nex.type==='timed'?nex.dur:0);setPhysioRunning(false);}}}
  function finishPhysio(){var s={id:Date.now(),date:new Date().toISOString().slice(0,10),type:'physio',data:{programme:prog.name,exercises:prog.exercises.length}};saveHistory([s].concat(history));setPhysioPhase('select');setView('home');}
  function logBP(){var sys=parseInt(bpSys),dia=parseInt(bpDia);if(!sys||!dia)return;var e={id:Date.now(),date:new Date().toISOString().slice(0,10),time:new Date().toLocaleTimeString('en-IE',{hour:'2-digit',minute:'2-digit'}),sys:sys,dia:dia,pulse:bpPulse?parseInt(bpPulse):null};saveBp([e].concat(bpLog));setBpSys('');setBpDia('');setBpPulse('');}
  function logWeight(){var kg=parseFloat(weightVal);if(!kg)return;saveWeight([{id:Date.now(),date:new Date().toISOString().slice(0,10),kg:kg}].concat(weightLog));setWeightVal('');}

  var thisWeek=(function(){var t=new Date(),d={};history.forEach(function(s){if((t-new Date(s.date))/86400000<7)d[s.date]=1;});return Object.keys(d).length;})();

  if(view==='home') return h(HomeView,{history:history,bpLog:bpLog,weightLog:weightLog,thisWeek:thisWeek,installPrompt:installPrompt,setInstallPrompt:setInstallPrompt,setView:setView,startWorkout:startWorkout,goYoga:goYoga,goPhysio:goPhysio});
  if(view==='bp') return h(BPView,{bpLog:bpLog,bpSys:bpSys,setBpSys:setBpSys,bpDia:bpDia,setBpDia:setBpDia,bpPulse:bpPulse,setBpPulse:setBpPulse,logBP:logBP,saveBp:saveBp,setView:setView});
  if(view==='weight') return h(WeightView,{weightLog:weightLog,weightVal:weightVal,setWeightVal:setWeightVal,logWeight:logWeight,saveWeight:saveWeight,setView:setView});
  if(view==='history') return h(HistoryView,{history:history,expanded:expanded,setExpanded:setExpanded,setView:setView});
  if(view==='progress') return h(ProgressView,{history:history,selEx:selEx,setSelEx:setSelEx,setView:setView});

  if(view==='yoga'){
    if(phase==='yogaSelect') return h(YogaSelectView,{setView:setView,startYoga:startYoga});
    return h(YogaRunView,{phase:phase,setPhase:setPhase,yogaFlowIdx:yogaFlowIdx,yogaIdx:yogaIdx,yogaTime:yogaTime,yogaStarted:yogaStarted,yogaPaused:yogaPaused,setYogaStarted:setYogaStarted,setYogaPaused:setYogaPaused,skipYogaPose:skipYogaPose,finishYoga:finishYoga,yogaRef:yogaRef,setView:setView});
  }

  if(view==='physio') return h(PhysioView,{physioPhase:physioPhase,setPhysioPhase:setPhysioPhase,prog:prog,physioEx:physioEx,physioSet:physioSet,physioTime:physioTime,physioRunning:physioRunning,setPhysioRunning:setPhysioRunning,startPhysio:startPhysio,physioNext:physioNext,finishPhysio:finishPhysio,physioRef:physioRef,setView:setView});

  if(view==='workout') return h(WorkoutView,{phase:phase,setPhase:setPhase,wType:wType,ssIdx:ssIdx,round:round,restTime:restTime,restDur:restDur,condRound:condRound,setCondRound:setCondRound,entries:entries,completeRound:completeRound,completeCondRound:completeCondRound,finish:finish,skipRest:skipRest,upd:upd,setView:setView});

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App, null));
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});}

})();
</script>
</body>
</html>
